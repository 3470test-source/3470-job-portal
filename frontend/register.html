<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3470 Healthcare & Training Institutes Job portal - Register Job seeker</title>

    <!-- Favicon -->
    <link rel="icon" href="/image/Logo3470-health3-removebg-preview.png" type="image/x-icon">
    
    <link rel="stylesheet" href="styles.css" />

    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    </style>

</head>
<body>

<div class="jobseeker-register-container">

    <!-- LEFT INFO BOX -->
    <div class="jobseeker-register-left">
        <img src="/image/Logo3470-health3-removebg-preview.png" class="jobseeker-register-logo">
        <h3>On registering, you can</h3>
        <ul class="jobseeker-register-benefits">
            <li><i class="fa-solid fa-circle-check"></i> Build your profile and let recruiters find you</li>
            <li><i class="fa-solid fa-circle-check"></i> Get job postings delivered to your email</li>
            <li><i class="fa-solid fa-circle-check"></i> Find a job and grow your career</li>
        </ul>
    </div>

    <!-- RIGHT FORM BOX -->
    <div class="jobseeker-register-right">
        <div class="jobseeker-register-card">
            <h2>Create Job Seeker Account</h2>

            <form id="registerForm" enctype="multipart/form-data">

                <div class="jobseeker-input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required>
                    <small class="error"></small>
                </div>

                <div class="jobseeker-input-group">
                    <label>Email ID</label>
                    <input type="email" id="email" required>
                    <small class="error"></small>
                </div>

                <div class="jobseeker-input-group">
                    <label>Phone NO</label>
                    <input type="tel" id="phone"
                    pattern="[6-9]{1}[0-9]{9}" maxlength="10" required>
                    <small class="error"></small>
                </div>

                <div class="jobseeker-input-group">
                    <label>Password</label>
                    <input type="password" id="password"
                    minlength="6" required>
                    <small class="error"></small>
                </div>

                <div class="jobseeker-input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword"
                    minlength="6" required>
                    <small class="error"></small>
                </div>

                <div class="jobseeker-input-group">
                    <label>Upload Resume (PDF only)</label>
                    <input type="file" id="resume" accept=".pdf" required>
                </div>

                <button type="submit" class="jobseeker-register-btn">
                    Register
                </button>

                <p class="jobseeker-login-link">
                    Already have an account?
                    <a href="/frontend/login.html">Login</a>
                </p>

            </form>
        </div>
    </div>

</div>

</body>
</html>
