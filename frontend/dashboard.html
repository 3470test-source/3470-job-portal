<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">

  <style>
   body {
  margin: 0;
  font-family: Arial;
}

.dashboard {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 250px;
  background: #007bff;
  color: white;
  padding: 20px;
}

.sidebar ul {
  list-style: none;
  padding: 0;
}

.sidebar li {
  padding: 10px;
  cursor: pointer;
}

.sidebar li:hover {
  background: #0056b3;
}

/* Content */
.content {
  flex: 1;
  padding: 20px;
  background: #f5f7fa;
}

.section {
  display: none;
}

.section.active {
  display: block;
}

/* Cards */
.job-card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
  </style>

</head>
<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>My Dashboard</h2>
    <ul>
      <li onclick="showSection('profile')">Profile</li>
      <li onclick="showSection('applied')">Applied Jobs</li>
      <li onclick="showSection('saved')">Saved Jobs</li>
      <li onclick="showSection('recommended')">Recommended</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="content">

    <!-- Profile -->
    <div id="profile" class="section active">
      <h2>Profile</h2>
      <p>Name: Vignesh</p>
      <p>Email: vignesh@email.com</p>
      <button>Edit Profile</button>
    </div>

    <!-- Applied Jobs -->
    <div id="applied" class="section">
      <h2>Applied Jobs</h2>
      <div id="appliedJobs"></div>
    </div>

    <!-- Saved Jobs -->
    <div id="saved" class="section">
      <h2>Saved Jobs</h2>
      <div id="savedJobs"></div>
    </div>

    <!-- Recommended -->
    <div id="recommended" class="section">
      <h2>Recommended Jobs</h2>
      <div id="recommendedJobs"></div>
    </div>

  </div>

</div>

<script src="dashboard.js"></script>


<script>
// Switch sections
function showSection(sectionId) {
  document.querySelectorAll(".section").forEach(sec => {
    sec.classList.remove("active");
  });

  document.getElementById(sectionId).classList.add("active");
}

// Sample Data
const appliedJobs = [
  { title: "QA Tester", company: "ABC Tech" },
  { title: "Automation Tester", company: "TestCorp" }
];

const savedJobs = [
  { title: "Frontend Dev", company: "XYZ Pvt Ltd" }
];

const recommendedJobs = [
  { title: "SDET", company: "TechSoft" },
  { title: "QA Engineer", company: "Infosys" }
];

// Render function
function renderJobs(data, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  data.forEach(job => {
    const div = document.createElement("div");
    div.className = "job-card";
    div.innerHTML = `
      <h3>${job.title}</h3>
      <p>${job.company}</p>
    `;
    container.appendChild(div);
  });
}

// Load data
renderJobs(appliedJobs, "appliedJobs");
renderJobs(savedJobs, "savedJobs");
renderJobs(recommendedJobs, "recommendedJobs");
</script>


</body>
</html>
