<!DOCTYPE html>
<html>
<head>
  <title>Job Listings</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f7fa;
    }

    .job-card {
      background: #fff;
      padding: 15px;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .btn {
      background: #007bff;
      color: white;
      padding: 8px 15px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<h2>Available Jobs</h2>

<div id="job-list"></div>

<script>
const jobs = [
  {
    id: 1,
    title: "QA Tester",
    company: "ABC Tech",
    location: "Chennai"
  },
  {
    id: 2,
    title: "Frontend Developer",
    company: "XYZ Pvt Ltd",
    location: "Bangalore"
  }
];

const container = document.getElementById("job-list");

jobs.forEach(job => {
  const div = document.createElement("div");
  div.className = "job-card";

  div.innerHTML = `
    <h3>${job.title}</h3>
    <p>${job.company} - ${job.location}</p>
    <button class="btn" onclick="viewJob(${job.id})">
      View Details
    </button>
  `;

  container.appendChild(div);
});

function viewJob(id) {
  window.location.href = `job-details.html?id=${id}`;
}
</script>

</body>
</html>
