<!DOCTYPE html>
<html>
<head>
  <title>Job Portal</title>
  <link rel="stylesheet" href="style.css">


  <style>
    body {
  font-family: Arial;
  margin: 0;
  background: #f5f6f7;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: white;
}









.sidebar {
  width: 280px;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
  height: 90vh;
  overflow-y: auto;
}

.filter {
  margin: 15px 0;
}

.filter h4 {
  font-size: 14px;
  margin-bottom: 8px;
}

.filter label {
  display: block;
  font-size: 13px;
  margin-bottom: 5px;
  cursor: pointer;
}

hr {
  border: none;
  border-top: 1px solid #eee;
}

/* Range */
.range-labels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
}

/* Collapsible */
.filter-header {
  display: flex;
  justify-content: space-between;
  cursor: pointer;
}

/* Hide content */
.hidden {
  display: none;
}

/* View more button */
.view-more {
  border: none;
  background: none;
  color: blue;
  cursor: pointer;
  font-size: 12px;
}







  </style>

</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">3470 Jobs</div>

  <nav>
    <a href="#">Jobs</a>
    <a href="#">Companies</a>
    <a href="#">Services</a>
  </nav>

  <input type="text" id="search" placeholder="Search jobs..." onkeyup="searchJobs()">

</header>






<aside class="sidebar">

<h3>All Filters</h3>

<hr>

<!-- Work Mode -->
<div class="filter">
  <h4>Work Mode</h4>
  <label><input type="checkbox"> Work from office</label>
  <label><input type="checkbox"> Hybrid</label>
</div>

<hr>

<!-- Experience -->
<div class="filter">
  <h4>Experience</h4>

  <input type="range" min="0" max="30" value="5" id="expRange">

  <div class="range-labels">
    <span>0 Yrs</span>
    <span>30 Yrs</span>
  </div>
</div>

<hr>

<!-- Department -->
<div class="filter">
  <h4>Department</h4>
  <label><input type="checkbox"> IT</label>
  <label><input type="checkbox"> Finance</label>
</div>

<hr>

<!-- Salary -->
<div class="filter">
  <h4>Salary</h4>
  <label><input type="checkbox"> 0-3</label>
  <label><input type="checkbox"> 3-6</label>
</div>

<hr>

<!-- Company Type -->
<div class="filter">
  <h4>Company Type</h4>
  <label><input type="checkbox"> MNC</label>
  <label><input type="checkbox"> Startup</label>
</div>

<hr>

<!-- Role Category (Collapsible) -->
<div class="filter">

  <div class="filter-header" onclick="toggleRole()">
    <h4>Role Category</h4>
    <span id="arrow">▼</span>
  </div>

  <div id="roleContent">
    <label><input type="checkbox"> Testing</label>
    <label><input type="checkbox"> Dev</label>

    <!-- Hidden items -->
    <div id="moreRoles" class="hidden">
      <label><input type="checkbox"> Support</label>
      <label><input type="checkbox"> Analyst</label>
    </div>

    <button class="view-more" onclick="toggleMore(event)">View More</button>
  </div>

</div>

<hr>

<!-- Education -->
<div class="filter">
  <h4>Education</h4>
  <label><input type="checkbox"> BCA</label>
  <label><input type="checkbox"> BE</label>
</div>

<hr>

<!-- Location -->
<div class="filter">
  <h4>Location</h4>
  <label><input type="checkbox"> Chennai</label>
  <label><input type="checkbox"> Bangalore</label>
</div>

</aside>







<script src="script.js"></script>



<script>
function toggleRole() {
  let content = document.getElementById("roleContent");
  let arrow = document.getElementById("arrow");

  if (content.style.display === "none") {
    content.style.display = "block";
    arrow.innerHTML = "▼";
  } else {
    content.style.display = "none";
    arrow.innerHTML = "▶";
  }
}

function toggleMore(event) {
  event.stopPropagation();

  let more = document.getElementById("moreRoles");
  let btn = event.target;

  if (more.classList.contains("hidden")) {
    more.classList.remove("hidden");
    btn.innerText = "View Less";
  } else {
    more.classList.add("hidden");
    btn.innerText = "View More";
  }
}
</script>

</body>
</html>
