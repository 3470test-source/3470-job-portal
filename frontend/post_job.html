<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3470 Healthcare & Training Institutes Job portal - Employer Dashborad</title>

    <!-- Favicon -->
    <link rel="icon" href="/image/Logo3470-health3-removebg-preview.png" type="image/x-icon">
    
    <link rel="stylesheet" href="styles.css" />

    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  
  <style>

    * {
      box-sizing:border-box;
    }

    body {
      background: linear-gradient(to right, #eef2f3, #dfe9f3);
      margin: 0;
      padding: 20px;
    }

  </style>

</head>

<body>

<!-- Post a Job -->
<div class="form-wrapper-employer">  
  <div class="form-container-employer">
    <h2>Employer Post a Job</h2>
      
      <input type="text" id="title" placeholder="Job Title" />
      <input type="text" id="company" placeholder="Company Name" />

      <!-- FILE UPLOAD -->
      <input type="file" id="logo" accept="image/*" onchange="previewLogo()" />
      <img id="preview" class="preview-img-emp"/>

      <input type="text" id="experience" placeholder="Experience (e.g. 1-4 Yrs)" />
      <input type="text" id="location" placeholder="Location" />
      <input type="text" id="salary" placeholder="Salary (e.g. 4-6 LPA)" />

      <input type="text" id="skills" placeholder="Skills (comma separated)" />

      <textarea id="description" placeholder="Job Description"></textarea>

    <button onclick="postJob()">Post Job</button>
  </div>
</div>

  <!-- JOB LIST -->
  <div class="jobs-section-employer-dash">
    <h2>Posted Jobs</h2>
    <div id="employerJobs" class="job-employer-grid"></div>
  </div>


<script>

  function previewLogo() {
    const file = document.getElementById("logo").files[0];
    const preview = document.getElementById("preview");

    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";
    }
  }

  async function postJob() {

    const title = document.getElementById("title").value;
    const company = document.getElementById("company").value;

    if (!title || !company) {
      alert("Title and Company are required!");
      return;
    }

    const formData = new FormData();

    formData.append("title", title);
    formData.append("company", company);
    formData.append("experience", document.getElementById("experience").value);
    formData.append("location", document.getElementById("location").value);
    formData.append("salary", document.getElementById("salary").value);
    formData.append("skills", document.getElementById("skills").value);
    formData.append("description", document.getElementById("description").value);

    const file = document.getElementById("logo").files[0];
    if (file) {
      formData.append("logo", file);
    }

    try {
      const res = await fetch("http://localhost:3000/jobs", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      alert("✅ " + data.message);

      // 🔥 Clear form
      document.querySelectorAll("input, textarea").forEach(el => el.value = "");
      document.getElementById("preview").style.display = "none";

    } catch (err) {
      alert("❌ Error posting job");
      console.error(err);
    }
  }

</script>


<script>

// 🔥 Load jobs
async function loadEmployerJobs() {
  const res = await fetch("http://localhost:3000/jobs");
  const jobs = await res.json();

  const container = document.getElementById("employerJobs");
  container.innerHTML = "";

  jobs.forEach(job => {

    const div = document.createElement("div");
    div.classList.add("job-card-employer");

    // convert skills string → array
    const skills = job.skills ? job.skills.split(",") : [];

    div.innerHTML = `
      <div class="job-header-employer">

       <img 
  src="${job.logo ? 'http://localhost:3000/uploads/' + job.logo : 'https://via.placeholder.com/50'}"
  onerror="this.src='https://via.placeholder.com/50'"
  alt="logo"
       />

        <div>
          <p class="job-title-employer">${job.title}</p>
          <p class="company-name-employer">${job.company}</p>
        </div>
      </div>

      <div class="job-info-employer">
        📍 ${job.location} <br>
        💰 ${job.salary} <br>
        🎯 ${job.experience || "Not specified"} yrs experience
      </div>

      <div class="skills-employer">
        ${skills.map(skill => `<span class="skill-tag-employer">${skill}</span>`).join("")}
      </div>

      <div class="job-desc-employer">
        ${job.description || "No job description provided"}
      </div>

      <button class="delete-btn-employer" onclick="deleteJob(${job.id})">
        Delete Job
      </button>
    `;

    container.appendChild(div);
  });
}

// 🔥 Delete job
async function deleteJob(id) {
  if (!confirm("Are you sure to delete this job?")) return;

  await fetch(`http://localhost:3000/jobs/${id}`, {
    method: "DELETE"
  });

  alert("Job Deleted ✅");

  loadEmployerJobs();
}

window.onload = loadEmployerJobs;

</script>

 </body>
</html>
