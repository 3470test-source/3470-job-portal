<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3470 Healthcare & Training Institutes - Login</title>

    <!-- Favicon -->
    <link rel="icon" href="picture/Logo3470-health3 (2).jpg" type="image/x-icon">
    
    <link rel="stylesheet" href="styles.css" />

    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background:#f3f6fb;
        }
    </style>
    
</head>
<body>

    <!-- NAVBAR -->
    <div class="job-login-navbar">

        <!-- LOGO -->
        <div class="job-login-logo-container">
            <img src="../frontend/image/Logo3470-health3-removebg-preview.png"
                 alt="3470 Healthcare Logo"
                 class="job-login-logo-img">
        </div>

        <!-- NAV LINKS -->
        <div class="job-login-nav-links">
            <a href="#">Jobs</a>
            <a href="#">Courses</a>
            <a href="#">Services</a>
        </div>

        <!-- SEARCH BAR -->
        <div class="job-login-search-bar">
            <input type="text" placeholder="Search jobs, courses, hospitals...">
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <!-- BUTTONS -->
        <div class="job-login-nav-buttons">
            <button class="job-lg-login-btn">Login</button>
            <button class="job-lg-register-btn">Register</button>
        </div>

    </div>

    <!-- MAIN SECTION -->
    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left-box">
            <h2>New to 3470 Healthcare?</h2>
            <ul>
                <li>✔ One click apply using your profile.</li>
                <li>✔ Get healthcare job recommendations.</li>
                <li>✔ Showcase profile to hospitals & institutes.</li>
                <li>✔ Track application status easily.</li>
            </ul>

            <button class="register-free">Register for Free</button>
        </div>

        <!-- RIGHT SIDE LOGIN -->
        <div class="right-box">
            <h2>Login</h2>

            <div class="input-group">
                <label>Email ID</label>
                <input type="email" placeholder="Enter Email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter Password">
            </div>

            <div class="forgot">
                <a href="#">Forgot Password?</a>
            </div>

            <button class="login-main">Login</button>

            <div class="divider">OR</div>

            <button class="google-btn">Sign in with Google</button>
        </div>

    </div>

</body>
</html>
